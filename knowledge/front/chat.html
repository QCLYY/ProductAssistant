<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>品辅</title>
  <style>
    :root{
      --bg:#f4f8ff;
      --panel:#ffffff;
      --soft:#f8fbff;
      --text:#172033;
      --muted:#64748b;
      --line:#dbe6f3;
      --brand:#0ea5e9;
      --brand2:#6366f1;
      --ok:#10b981;
      --bad:#ef4444;
      --shadow:0 24px 60px -34px rgba(15,23,42,.38);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:"Segoe UI","Microsoft YaHei",system-ui,-apple-system,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 8% 12%, rgba(14,165,233,.16), transparent 30%),
        radial-gradient(circle at 88% 10%, rgba(99,102,241,.13), transparent 30%),
        linear-gradient(to right, rgba(15,23,42,.035) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(15,23,42,.035) 1px, transparent 1px),
        var(--bg);
      background-size:100% 100%,100% 100%,40px 40px,40px 40px;
      padding:18px;
    }
    .app{
      width:min(1280px,100%);
      height:calc(100vh - 36px);
      margin:0 auto;
      display:grid;
      grid-template-columns:minmax(0,1fr) 320px;
      gap:16px;
    }
    .chat-panel,.side-panel{
      min-height:0;
      background:rgba(255,255,255,.95);
      border:1px solid rgba(15,23,42,.08);
      border-radius:12px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .chat-panel{display:flex;flex-direction:column}
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding:14px 16px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg,#fff,#f8fbff);
    }
    .brand{display:flex;align-items:center;gap:11px;min-width:0}
    .logo{
      width:40px;height:40px;border-radius:12px;
      position:relative;flex:0 0 auto;
      background:linear-gradient(135deg,#e0f2fe,#dbeafe 52%,#ede9fe);
      border:1px solid rgba(14,165,233,.22);
      box-shadow:0 12px 24px rgba(14,165,233,.18);
      overflow:hidden;
    }
    .logo::before{
      content:"";
      position:absolute;
      left:10px;top:8px;
      width:15px;height:20px;
      border-radius:4px;
      border:1px solid rgba(14,165,233,.28);
      background:#fff;
    }
    .logo::after{
      content:"";
      position:absolute;
      right:8px;bottom:8px;
      width:13px;height:13px;
      border-radius:50%;
      border:3px solid var(--brand);
      box-shadow:8px 8px 0 -5px var(--brand2);
    }
    .brand strong{display:block;font-size:15px;color:#0f172a}
    .brand span{display:block;margin-top:3px;font-size:12px;color:var(--muted)}
    .top-actions{display:flex;align-items:center;gap:9px;flex-wrap:wrap;justify-content:flex-end}
    .btn{
      border:none;
      border-radius:9px;
      padding:8px 12px;
      color:#fff;
      background:linear-gradient(135deg,var(--brand),var(--brand2));
      cursor:pointer;
      text-decoration:none;
      font-size:12px;
      min-height:34px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .btn.secondary{background:#fff;color:#334155;border:1px solid var(--line)}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .mode-strip{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding:10px 16px;
      border-bottom:1px solid var(--line);
      background:rgba(248,251,255,.86);
    }
    .mode-copy strong{display:block;font-size:13px;color:#0f172a}
    .mode-copy span{display:block;font-size:12px;color:var(--muted);margin-top:2px}
    .mode-options{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .toggle{
      display:inline-flex;
      align-items:center;
      gap:7px;
      border:1px solid var(--line);
      border-radius:9px;
      background:#fff;
      color:#64748b;
      min-height:32px;
      padding:6px 10px;
      font-size:12px;
      cursor:pointer;
      user-select:none;
    }
    .toggle input{accent-color:var(--brand)}
    .toggle.active{border-color:rgba(14,165,233,.34);background:#eff6ff;color:#075985}
    .chat{
      flex:1;
      min-height:0;
      overflow:auto;
      padding:16px 18px;
      background:linear-gradient(180deg,#f8fbff,#f3f7fd);
    }
    .dayline{text-align:center;color:var(--muted);font-size:12px;margin:2px 0 14px}
    .msg{display:flex;gap:10px;margin:12px 0;align-items:flex-start}
    .msg.user{justify-content:flex-end}
    .avatar{
      width:34px;height:34px;border-radius:10px;
      display:grid;place-items:center;
      color:#2563eb;
      background:linear-gradient(135deg,rgba(14,165,233,.14),rgba(99,102,241,.12));
      flex:0 0 auto;
      font-size:13px;
      font-weight:700;
    }
    .avatar.user{color:#64748b;background:#eaf2fb}
    .msg-body{min-width:0;max-width:min(780px,78%)}
    .msg.user .msg-body{display:flex;flex-direction:column;align-items:flex-end}
    .bubble{
      display:inline-block;
      max-width:100%;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      box-shadow:0 12px 30px rgba(15,23,42,.07);
      padding:11px 13px;
      line-height:1.7;
      white-space:pre-wrap;
      word-break:break-word;
      overflow-wrap:anywhere;
      font-size:14px;
      color:#172033;
    }
    .msg.user .bubble{
      color:#fff;
      border-color:transparent;
      background:linear-gradient(135deg,var(--brand),var(--brand2));
      box-shadow:0 14px 26px rgba(14,165,233,.22);
    }
    .meta{
      margin-top:5px;
      font-size:11px;
      color:#94a3b8;
    }
    .welcome .bubble{
      max-width:820px;
      padding:16px;
      border-radius:10px;
      border-color:rgba(14,165,233,.18);
      background:linear-gradient(180deg,#fff,#f8fbff);
    }
    .welcome-title{font-size:18px;font-weight:800;color:#0f172a;margin-bottom:8px}
    .welcome-copy{margin:0;color:#475569;line-height:1.8}
    .welcome-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
    .status-chip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border:1px solid #dbeafe;
      border-radius:999px;
      background:#eff6ff;
      color:#1d4ed8;
      padding:5px 8px;
      font-size:12px;
    }
    details.progress{
      margin-bottom:10px;
      border:1px dashed rgba(14,165,233,.34);
      border-radius:10px;
      background:#f8fbff;
      padding:8px 10px;
    }
    details.progress summary{cursor:pointer;color:#64748b;font-size:12px;user-select:none}
    .progress-list{margin:8px 0 0 18px;padding:0;color:#64748b;font-size:12px;line-height:1.65}
    .answer-text{line-height:1.8}
    .answer-text p{margin:0 0 10px}
    .answer-text h3,.answer-text h4{margin:12px 0 7px;color:#0f172a;line-height:1.45}
    .answer-text h3{font-size:16px}.answer-text h4{font-size:14px}
    .answer-text ul,.answer-text ol{margin:6px 0 10px 22px;padding:0}
    .answer-text li{margin:4px 0}
    .answer-text code{background:#eef6ff;color:#1d4ed8;border-radius:5px;padding:1px 5px;font-family:ui-monospace,Consolas,monospace}
    .answer-text strong{font-weight:800;color:#0f172a}
    .typing{display:inline-flex;align-items:center;gap:6px}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--brand);animation:bounce 1.2s infinite ease-in-out}
    .dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
    @keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.55}40%{transform:translateY(-5px);opacity:1}}
    .sources{margin-top:12px;display:flex;flex-direction:column;gap:8px}
    .source-card{
      display:block;
      border:1px solid #dbeafe;
      border-radius:9px;
      background:#f8fbff;
      padding:8px 10px;
      color:#334155;
      text-decoration:none;
      font-size:12px;
    }
    .source-card strong{display:block;color:#0f172a;font-size:12px;line-height:1.45}
    .source-card span{display:block;margin-top:3px;color:#64748b;word-break:break-all}
    .composer{
      border-top:1px solid var(--line);
      background:#fff;
      padding:12px 14px 8px;
    }
    .composer-row{display:flex;align-items:flex-end;gap:10px}
    textarea{
      flex:1;
      resize:none;
      min-height:46px;
      max-height:150px;
      border:1px solid var(--line);
      border-radius:12px;
      background:#f8fbff;
      color:#172033;
      outline:none;
      padding:11px 12px;
      line-height:1.55;
      font-size:14px;
    }
    textarea:focus{border-color:rgba(14,165,233,.58);box-shadow:0 0 0 3px rgba(14,165,233,.14)}
    .send{width:86px;height:46px;border:none;border-radius:12px;color:#fff;background:linear-gradient(135deg,var(--brand),var(--brand2));cursor:pointer;font-weight:700}
    .hint{margin-top:7px;color:#94a3b8;font-size:12px}
    .kbd{border:1px solid var(--line);border-radius:6px;padding:1px 6px;background:#f8fbff;color:#64748b;font-family:ui-monospace,Consolas,monospace}
    .side-panel{display:flex;flex-direction:column}
    .side-head{padding:15px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fff,#f8fbff)}
    .side-head strong{display:block;color:#0f172a}
    .side-head span{display:block;margin-top:4px;color:var(--muted);font-size:12px}
    .side-section{padding:14px 15px;border-bottom:1px solid var(--line)}
    .side-section:last-child{border-bottom:none}
    .side-title{display:flex;align-items:center;justify-content:space-between;gap:10px;font-weight:700;font-size:13px;color:#0f172a;margin-bottom:10px}
    .quick-list,.material-list{display:flex;flex-direction:column;gap:8px}
    .quick{
      width:100%;
      text-align:left;
      border:1px solid #dbeafe;
      border-radius:9px;
      background:#eff6ff;
      color:#1d4ed8;
      padding:8px 10px;
      cursor:pointer;
      font-size:12px;
      line-height:1.45;
    }
    .material-item{
      border:1px solid var(--line);
      border-radius:9px;
      background:#fff;
      padding:9px 10px;
      cursor:pointer;
    }
    .material-item strong{display:block;color:#0f172a;font-size:12px;line-height:1.45}
    .material-item span{display:block;margin-top:4px;color:#64748b;font-size:12px}
    .empty{border:1px dashed var(--line);border-radius:9px;background:#f8fbff;color:#64748b;text-align:center;padding:14px;font-size:12px}
    @media (max-width:980px){
      body{padding:10px}
      .app{height:calc(100vh - 20px);grid-template-columns:1fr}
      .side-panel{display:none}
      .mode-strip{align-items:flex-start;flex-direction:column}
      .mode-options{justify-content:flex-start}
      .msg-body{max-width:88%}
    }
    @media (max-width:640px){
      .topbar{align-items:flex-start;flex-direction:column}
      .top-actions{width:100%;justify-content:flex-start}
      .msg-body{max-width:100%}
      .composer-row{align-items:stretch}
      .send{width:72px}
    }
  </style>
</head>
<body>
<div class="app">
  <main class="chat-panel">
    <div class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div>
          <strong>品辅</strong>
          <span>在线 · 产品资料问答与联网搜索</span>
        </div>
      </div>
      <div class="top-actions">
        <a class="btn secondary" href="/">上传资料</a>
        <button class="btn secondary" id="reloadMaterialsBtn" type="button">刷新资料</button>
        <button class="btn" id="clearBtn" type="button">清空对话</button>
      </div>
    </div>

    <div class="mode-strip">
      <div class="mode-copy">
        <strong>能力状态</strong>
        <span>本地优先；本地查不到时，可按开关决定是否联网补充。</span>
      </div>
      <div class="mode-options">
        <label class="toggle active"><input id="localToggle" type="checkbox" checked> 本地搜索</label>
        <label class="toggle"><input id="webToggle" type="checkbox"> 联网搜索</label>
        <label class="toggle active"><input id="streamToggle" type="checkbox" checked> 流式输出</label>
      </div>
    </div>

    <div class="chat" id="chat">
      <div class="dayline">今天</div>
      <div class="msg bot welcome">
        <div class="avatar">品</div>
        <div class="msg-body">
          <div class="bubble">
            <div class="welcome-title">你好，我是你的产品助手。</div>
            <p class="welcome-copy">我可以基于你上传的产品资料回答问题，也可以联网搜索哦~有什么想问的欢迎咨询！</p>
            <div class="welcome-grid">
              <span class="status-chip">本地资料优先</span>
              <span class="status-chip">可选联网补充</span>
              <span class="status-chip">回答来源可见</span>
            </div>
          </div>
          <div class="meta">建议先上传资料，再围绕产品、参数、步骤、结论或对比提问。</div>
        </div>
      </div>
    </div>

    <div class="composer">
      <div class="composer-row">
        <textarea id="input" placeholder="请输入问题（Enter 发送，Shift+Enter 换行）"></textarea>
        <button class="send" id="sendBtn" type="button">发送</button>
      </div>
      <div class="hint">快捷键：<span class="kbd">Enter</span> 发送，<span class="kbd">Shift</span> + <span class="kbd">Enter</span> 换行</div>
    </div>
  </main>

  <aside class="side-panel">
    <div class="side-head">
      <strong>本地资料与快捷问题</strong>
      <span>点击资料可快速围绕该资料提问。</span>
    </div>
    <section class="side-section">
      <div class="side-title">
        <span>本地资料</span>
        <a class="btn secondary" href="/" style="min-height:30px;padding:6px 9px">管理</a>
      </div>
      <div class="material-list" id="materialList"><div class="empty">正在读取...</div></div>
    </section>
    <section class="side-section">
      <div class="side-title">快捷问题</div>
      <div class="quick-list">
        <button class="quick" data-prompt="列出本地资料清单">列出本地资料清单</button>
        <button class="quick" data-prompt="请基于已上传资料，总结目前可以查询的内容范围">总结本地资料范围</button>
        <button class="quick" data-prompt="关闭联网搜索时，如果本地资料没有依据，请直接告诉我没有查询到">测试本地优先逻辑</button>
        <button class="quick" data-prompt="请先查本地资料，如果没有再联网搜索相关信息">本地查不到再联网</button>
      </div>
    </section>
  </aside>
</div>

<script>
  const API_BASE = location.protocol.startsWith('http') ? location.origin : 'http://127.0.0.1:8000';
  const chatEl = document.getElementById('chat');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const clearBtn = document.getElementById('clearBtn');
  const localToggle = document.getElementById('localToggle');
  const webToggle = document.getElementById('webToggle');
  const streamToggle = document.getElementById('streamToggle');
  const materialList = document.getElementById('materialList');
  let sessionId = localStorage.getItem('pf_session_id');
  if(!sessionId){
    sessionId = `sess-${Math.random().toString(36).slice(2)}${Date.now().toString(36)}`;
    localStorage.setItem('pf_session_id', sessionId);
  }

  function escapeHtml(value){
    return String(value ?? '')
      .replaceAll('&','&amp;')
      .replaceAll('<','&lt;')
      .replaceAll('>','&gt;')
      .replaceAll('"','&quot;')
      .replaceAll("'","&#039;");
  }
  function nowTime(){
    return new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  }
  function formatTime(ts){
    if(!ts) return nowTime();
    const numeric = Number(ts);
    const date = Number.isNaN(numeric) ? new Date(ts) : new Date(numeric * 1000);
    return Number.isNaN(date.getTime()) ? nowTime() : date.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  }
  function scrollToBottom(){ chatEl.scrollTop = chatEl.scrollHeight; }
  function isNearBottom(){ return chatEl.scrollHeight - chatEl.scrollTop - chatEl.clientHeight < 90; }
  function scrollIfNearBottom(){ if(isNearBottom()) scrollToBottom(); }
  function syncToggle(input){
    input.closest('.toggle').classList.toggle('active', input.checked);
  }
  [localToggle, webToggle, streamToggle].forEach(input => {
    syncToggle(input);
    input.addEventListener('change', () => syncToggle(input));
  });

  function inlineMarkdown(text){
    return escapeHtml(text)
      .replace(/`([^`]+)`/g,'<code>$1</code>')
      .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  }
  function renderMarkdown(target, text){
    target.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.className = 'answer-text';
    const lines = String(text || '').replace(/\r\n/g,'\n').split('\n');
    let list = null;
    function closeList(){ if(list){ wrap.appendChild(list); list = null; } }
    function addList(tag, content){
      if(!list || list.tagName.toLowerCase() !== tag){
        closeList();
        list = document.createElement(tag);
      }
      const li = document.createElement('li');
      li.innerHTML = inlineMarkdown(content);
      list.appendChild(li);
    }
    for(const raw of lines){
      const line = raw.trim();
      if(!line){ closeList(); continue; }
      if(/^#{1,6}\s+/.test(line)){
        closeList();
        const h = document.createElement(line.startsWith('###') ? 'h4' : 'h3');
        h.innerHTML = inlineMarkdown(line.replace(/^#{1,6}\s+/, ''));
        wrap.appendChild(h);
        continue;
      }
      const ordered = line.match(/^(\d+)[.、]\s+(.+)$/);
      if(ordered){ addList('ol', ordered[2]); continue; }
      const unordered = line.match(/^[-*•]\s+(.+)$/);
      if(unordered){ addList('ul', unordered[1]); continue; }
      closeList();
      const p = document.createElement('p');
      p.innerHTML = inlineMarkdown(line);
      wrap.appendChild(p);
    }
    closeList();
    target.appendChild(wrap);
  }
  function renderSources(target, sources){
    const items = Array.isArray(sources) ? sources : [];
    if(!items.length) return;
    const box = document.createElement('div');
    box.className = 'sources';
    items.forEach((source, index) => {
      const title = source.title || (source.type === 'web' ? '联网结果' : '本地资料');
      const meta = source.url || (source.chunk_id ? `片段 ${source.chunk_id}` : source.type || '');
      const node = source.url ? document.createElement('a') : document.createElement('div');
      node.className = 'source-card';
      if(source.url){
        node.href = source.url;
        node.target = '_blank';
        node.rel = 'noopener noreferrer';
      }
      node.innerHTML = `<strong>参考 ${index + 1}：${escapeHtml(title)}</strong>${meta ? `<span>${escapeHtml(meta)}</span>` : ''}`;
      box.appendChild(node);
    });
    target.appendChild(box);
  }

  function addUserMsg(text, ts){
    chatEl.insertAdjacentHTML('beforeend', `
      <div class="msg user">
        <div class="msg-body">
          <div class="bubble">${escapeHtml(text)}</div>
          <div class="meta">${ts ? formatTime(ts) : nowTime()}</div>
        </div>
        <div class="avatar user">我</div>
      </div>
    `);
    scrollToBottom();
  }
  function addBotMsg(text, ts, sources){
    const id = `bot-${Math.random().toString(36).slice(2)}`;
    chatEl.insertAdjacentHTML('beforeend', `
      <div class="msg bot" id="${id}">
        <div class="avatar">品</div>
        <div class="msg-body">
          <div class="bubble"><div class="answer"></div></div>
          <div class="meta">${ts ? formatTime(ts) : nowTime()}</div>
        </div>
      </div>
    `);
    const el = document.getElementById(id);
    const answer = el.querySelector('.answer');
    renderMarkdown(answer, text || '');
    renderSources(answer, sources || []);
    scrollToBottom();
    return el;
  }
  function addBotSkeleton(){
    const id = `bot-${Math.random().toString(36).slice(2)}`;
    chatEl.insertAdjacentHTML('beforeend', `
      <div class="msg bot" id="${id}">
        <div class="avatar">品</div>
        <div class="msg-body">
          <div class="bubble">
            <details class="progress" open>
              <summary>阶段进度（等待中）</summary>
              <ul class="progress-list"><li>等待处理...</li></ul>
            </details>
            <div class="answer"><span class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span></div>
          </div>
          <div class="meta">${nowTime()}</div>
        </div>
      </div>
    `);
    scrollToBottom();
    return document.getElementById(id);
  }
  function renderProgress(bot, doneList, runningList, status){
    const progress = bot.querySelector('.progress');
    if(!progress) return;
    const done = Array.isArray(doneList) ? doneList : [];
    const running = Array.isArray(runningList) ? runningList : [];
    const statusMap = {processing:'处理中', completed:'已完成', failed:'失败', pending:'等待中'};
    progress.querySelector('summary').textContent = `阶段进度（已完成 ${done.length}，进行中 ${running.length}，状态：${statusMap[status] || status || '处理中'}）`;
    const ul = progress.querySelector('.progress-list');
    ul.innerHTML = '';
    [...done.map(x => `已完成：${x}`), ...running.map(x => `处理中：${x}`)].forEach(line => {
      const li = document.createElement('li');
      li.textContent = line;
      ul.appendChild(li);
    });
    if(!ul.children.length){
      const li = document.createElement('li');
      li.textContent = '等待处理...';
      ul.appendChild(li);
    }
  }
  function appendProgressLog(bot, text){
    const ul = bot.querySelector('.progress-list');
    if(!ul || !text) return;
    const li = document.createElement('li');
    li.textContent = text;
    ul.appendChild(li);
  }
  function finalizeBot(bot, answerText, sources, error){
    const typing = bot.querySelector('.typing');
    if(typing) typing.remove();
    const progress = bot.querySelector('.progress');
    if(progress) progress.removeAttribute('open');
    const answer = bot.querySelector('.answer');
    answer.innerHTML = '';
    if(error){
      answer.textContent = `本次处理失败：${error}`;
      return;
    }
    renderMarkdown(answer, answerText || '没有返回回答。');
    renderSources(answer, sources || []);
  }

  async function submitQuery(text){
    const useLocal = localToggle.checked;
    const useWeb = webToggle.checked;
    const isStream = streamToggle.checked;
    if(!useLocal && !useWeb){
      alert('请至少开启“本地搜索”或“联网搜索”中的一种能力。');
      return;
    }
    addUserMsg(text);
    inputEl.value = '';
    document.querySelectorAll('details.progress').forEach(item => item.removeAttribute('open'));
    const bot = addBotSkeleton();
    sendBtn.disabled = true;
    let rawText = '';

    try{
      const res = await fetch(`${API_BASE}/query`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          query:text,
          session_id:sessionId,
          is_stream:isStream,
          use_local_search:useLocal,
          use_web_search:useWeb,
        })
      });
      if(!res.ok) throw new Error(await res.text() || '请求失败');
      const data = await res.json();

      if(!isStream){
        renderProgress(bot, data.done_list || [], [], 'completed');
        finalizeBot(bot, data.answer || '', data.sources || [], data.error || '');
        sendBtn.disabled = false;
        return;
      }

      const es = new EventSource(`${API_BASE}/stream/${data.task_id}`);
      es.addEventListener('progress', event => {
        try{
          const data = JSON.parse(event.data || '{}');
          renderProgress(bot, data.done_list, data.running_list, data.status);
          scrollIfNearBottom();
        }catch(_){}
      });
      es.addEventListener('node_log', event => {
        try{
          const data = JSON.parse(event.data || '{}');
          appendProgressLog(bot, data.msg || '');
          scrollIfNearBottom();
        }catch(_){}
      });
      es.addEventListener('delta', event => {
        try{
          const data = JSON.parse(event.data || '{}');
          if(data.delta){
            rawText += data.delta;
            const answer = bot.querySelector('.answer');
            renderMarkdown(answer, rawText);
            scrollIfNearBottom();
          }
        }catch(_){}
      });
      es.addEventListener('final', event => {
        try{
          const data = JSON.parse(event.data || '{}');
          renderProgress(bot, data.done_list || [], data.running_list || [], data.status || 'completed');
          finalizeBot(bot, data.answer || rawText, data.sources || [], data.error || '');
        }catch(_){
          finalizeBot(bot, rawText, [], '');
        }
        es.close();
        sendBtn.disabled = false;
        scrollIfNearBottom();
      });
      es.addEventListener('error', () => {
        if(rawText){
          finalizeBot(bot, rawText, [], '');
        }else{
          finalizeBot(bot, '', [], 'SSE 连接中断，请重新提问');
        }
        es.close();
        sendBtn.disabled = false;
      });
    }catch(err){
      finalizeBot(bot, '', [], err.message || err);
      sendBtn.disabled = false;
    }
  }

  async function loadMaterials(){
    materialList.innerHTML = '<div class="empty">正在读取...</div>';
    try{
      const res = await fetch(`${API_BASE}/materials`);
      const data = await res.json();
      const items = Array.isArray(data.materials) ? data.materials : [];
      if(!items.length){
        materialList.innerHTML = '<div class="empty">还没有本地资料，先去上传页导入。</div>';
        return;
      }
      materialList.innerHTML = '';
      items.slice(0, 8).forEach(item => {
        const title = item.file_title || item.material_name || '未命名资料';
        const node = document.createElement('button');
        node.className = 'material-item';
        node.type = 'button';
        node.innerHTML = `<strong>${escapeHtml(title)}</strong><span>${Number(item.chunk_count || 0)} 个片段 · 点击提问</span>`;
        node.addEventListener('click', () => {
          inputEl.value = `请基于《${title}》总结主要内容`;
          inputEl.focus();
        });
        materialList.appendChild(node);
      });
    }catch(err){
      materialList.innerHTML = `<div class="empty">读取失败：${escapeHtml(err.message || err)}</div>`;
    }
  }
  async function loadHistory(){
    try{
      const res = await fetch(`${API_BASE}/history/${sessionId}`);
      if(!res.ok) return;
      const data = await res.json();
      const items = Array.isArray(data.items) ? data.items : [];
      if(!items.length) return;
      const messages = Array.from(chatEl.querySelectorAll('.msg'));
      for(let i = 1; i < messages.length; i++) messages[i].remove();
      items.forEach(item => {
        if(item.role === 'user') addUserMsg(item.text || '', item.ts);
        else addBotMsg(item.text || '', item.ts, item.sources || []);
      });
    }catch(_){}
  }

  sendBtn.addEventListener('click', () => {
    const text = inputEl.value.trim();
    if(text) submitQuery(text);
  });
  inputEl.addEventListener('keydown', event => {
    if(event.key === 'Enter' && !event.shiftKey){
      event.preventDefault();
      const text = inputEl.value.trim();
      if(text) submitQuery(text);
    }
  });
  clearBtn.addEventListener('click', async () => {
    if(!confirm('确定清空当前会话历史吗？')) return;
    try{ await fetch(`${API_BASE}/history/${sessionId}`, {method:'DELETE'}); }catch(_){}
    const messages = Array.from(chatEl.querySelectorAll('.msg'));
    for(let i = 1; i < messages.length; i++) messages[i].remove();
    scrollToBottom();
  });
  document.querySelectorAll('[data-prompt]').forEach(btn => {
    btn.addEventListener('click', () => {
      inputEl.value = btn.getAttribute('data-prompt') || '';
      inputEl.focus();
    });
  });
  document.getElementById('reloadMaterialsBtn').addEventListener('click', loadMaterials);

  loadMaterials();
  loadHistory();
  setTimeout(() => inputEl.focus(), 180);
</script>
</body>
</html>
