<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>品辅资料库</title>
  <style>
    :root{
      --bg:#f5f8ff;
      --panel:#ffffff;
      --soft:#f8fbff;
      --text:#172033;
      --muted:#64748b;
      --line:#dbe6f3;
      --brand:#0ea5e9;
      --brand-2:#6366f1;
      --ok:#10b981;
      --warn:#f59e0b;
      --bad:#ef4444;
      --shadow:0 24px 60px -34px rgba(15,23,42,.38);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:"Segoe UI","Microsoft YaHei",system-ui,-apple-system,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 8% 12%, rgba(14,165,233,.16), transparent 30%),
        radial-gradient(circle at 88% 10%, rgba(99,102,241,.13), transparent 30%),
        linear-gradient(to right, rgba(15,23,42,.035) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(15,23,42,.035) 1px, transparent 1px),
        var(--bg);
      background-size:100% 100%,100% 100%,40px 40px,40px 40px;
      padding:24px;
    }
    .shell{max-width:1180px;margin:0 auto}
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:18px;
    }
    .brand{display:flex;align-items:center;gap:12px}
    .mark{
      width:44px;height:44px;border-radius:12px;
      display:grid;place-items:center;
      background:linear-gradient(135deg,#e0f2fe,#dbeafe 52%,#ede9fe);
      color:#0369a1;font-weight:800;
      border:1px solid rgba(14,165,233,.22);
      box-shadow:0 12px 24px rgba(14,165,233,.18);
    }
    h1{font-size:26px;line-height:1.2;margin:0;color:#0f172a}
    .subtitle{margin:5px 0 0;color:var(--muted);font-size:13px}
    .actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .btn{
      border:none;
      border-radius:9px;
      padding:9px 13px;
      color:#fff;
      background:linear-gradient(135deg,var(--brand),var(--brand-2));
      cursor:pointer;
      text-decoration:none;
      font-size:13px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:36px;
    }
    .btn.secondary{background:#fff;color:#334155;border:1px solid var(--line)}
    .btn.danger{background:#fff;color:#b91c1c;border:1px solid #fecaca}
    .btn.material-delete{
      flex:0 0 54px;
      width:54px;
      height:38px;
      padding:0;
      white-space:nowrap;
    }
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .layout{display:grid;grid-template-columns:minmax(0,1.2fr) minmax(320px,.8fr);gap:18px}
    .panel{
      background:rgba(255,255,255,.94);
      border:1px solid rgba(15,23,42,.08);
      border-radius:12px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .panel-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:16px 18px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg,#fff,#f8fbff);
    }
    .panel-title{font-weight:700;color:#0f172a}
    .panel-note{font-size:12px;color:var(--muted);margin-top:3px}
    .panel-body{padding:18px}
    .upload-area{
      border:2px dashed rgba(14,165,233,.34);
      border-radius:12px;
      background:linear-gradient(180deg,#fff,#f8fbff);
      padding:42px 22px;
      text-align:center;
      cursor:pointer;
      transition:.18s ease;
    }
    .upload-area:hover,.upload-area.dragging{
      border-color:var(--brand);
      background:#eff6ff;
      transform:translateY(-1px);
    }
    .upload-icon{font-size:38px;margin-bottom:10px}
    .upload-main{font-size:16px;font-weight:700;color:#0f172a}
    .upload-sub{font-size:13px;color:var(--muted);margin-top:7px}
    .file-input{display:none}
    .queue{margin-top:16px;display:flex;flex-direction:column;gap:12px}
    .file-item{
      border:1px solid var(--line);
      border-radius:10px;
      background:#fff;
      padding:14px;
    }
    .file-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .file-name{font-weight:700;color:#0f172a;word-break:break-all}
    .file-size{font-size:12px;color:var(--muted);margin-top:3px}
    .badge{
      flex:0 0 auto;
      border-radius:999px;
      padding:6px 12px;
      font-size:12px;
      font-weight:700;
      color:#fff;
      background:var(--warn);
    }
    .badge.processing{background:#3b82f6}
    .badge.done{background:var(--ok)}
    .badge.failed{background:var(--bad)}
    .progress-track{height:7px;border-radius:999px;background:#e2e8f0;overflow:hidden;margin-top:12px}
    .progress-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--brand),var(--brand-2));transition:width .25s ease}
    details.log{margin-top:12px;border:1px dashed rgba(14,165,233,.26);border-radius:9px;background:#f8fbff;padding:8px 10px}
    details.log summary{cursor:pointer;color:var(--muted);font-size:12px}
    .log-list{margin:8px 0 0 18px;padding:0;color:#475569;font-size:12px;line-height:1.65;max-height:150px;overflow:auto}
    .stack{display:flex;flex-direction:column;gap:18px}
    .toolbar{display:flex;align-items:center;gap:8px}
    .material-list{display:flex;flex-direction:column;gap:10px}
    .empty{border:1px dashed var(--line);border-radius:10px;padding:18px;color:var(--muted);background:#f8fbff;text-align:center;font-size:13px}
    .material-card{
      border:1px solid var(--line);
      border-radius:10px;
      background:#fff;
      padding:13px;
    }
    .material-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
    .material-info{min-width:0;flex:1}
    .material-title{font-weight:700;color:#0f172a;line-height:1.45;word-break:break-all}
    .material-meta{margin-top:6px;display:flex;flex-wrap:wrap;gap:6px;color:var(--muted);font-size:12px}
    .chip{border:1px solid #dbeafe;background:#eff6ff;color:#1d4ed8;border-radius:999px;padding:3px 7px}
    .check-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .check{
      border:1px solid var(--line);
      border-radius:9px;
      padding:10px;
      background:#fff;
      min-height:66px;
    }
    .check strong{display:block;font-size:13px;color:#0f172a}
    .check span{display:block;margin-top:4px;font-size:12px;color:var(--muted)}
    .check.ok{border-color:#bbf7d0;background:#f0fdf4}
    .check.bad{border-color:#fecaca;background:#fff7f7}
    @media (max-width:900px){
      body{padding:14px}
      .topbar{align-items:flex-start;flex-direction:column}
      .layout{grid-template-columns:1fr}
      .check-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="brand">
      <div class="mark">品</div>
      <div>
        <h1>品辅资料库</h1>
        <p class="subtitle">上传 PDF、Markdown 或 ZIP，作为品辅回答问题的本地资料来源。</p>
      </div>
    </div>
    <div class="actions">
      <button class="btn secondary" id="refreshBtn" type="button">刷新资料</button>
      <a class="btn" href="/front/chat.html">进入问答</a>
    </div>
  </div>

  <div class="layout">
    <section class="panel">
      <div class="panel-head">
        <div>
          <div class="panel-title">上传资料</div>
          <div class="panel-note">支持单个或多个文件，导入完成后会自动写入本地索引。</div>
        </div>
      </div>
      <div class="panel-body">
        <div class="upload-area" id="dropZone">
          <div class="upload-icon">📄</div>
          <div class="upload-main">点击或拖拽资料到这里</div>
          <div class="upload-sub">PDF / MD / ZIP，建议文件名保留清晰主题或型号</div>
          <input type="file" id="fileInput" class="file-input" accept=".pdf,.md,.zip" multiple>
        </div>
        <div id="queue" class="queue"></div>
      </div>
    </section>

    <div class="stack">
      <section class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">本地资料管理</div>
            <div class="panel-note">查看已经可以被本地搜索命中的资料。</div>
          </div>
          <div class="toolbar">
            <button class="btn secondary" id="loadMaterialsBtn" type="button">刷新</button>
          </div>
        </div>
        <div class="panel-body">
          <div id="materialList" class="material-list">
            <div class="empty">正在读取本地资料...</div>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">配置检查</div>
            <div class="panel-note">只显示是否配置，不显示密钥原文。</div>
          </div>
          <button class="btn secondary" id="checkConfigBtn" type="button">检查</button>
        </div>
        <div class="panel-body">
          <div id="configChecks" class="check-grid">
            <div class="empty">点击“检查”查看运行配置。</div>
          </div>
        </div>
      </section>
    </div>
  </div>
</div>

<script>
  const API_BASE = location.protocol.startsWith('http') ? location.origin : 'http://127.0.0.1:8000';
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const queue = document.getElementById('queue');
  const materialList = document.getElementById('materialList');
  const configChecks = document.getElementById('configChecks');

  function escapeHtml(value){
    return String(value ?? '')
      .replaceAll('&','&amp;')
      .replaceAll('<','&lt;')
      .replaceAll('>','&gt;')
      .replaceAll('"','&quot;')
      .replaceAll("'","&#039;");
  }
  function formatSize(bytes){
    if(bytes > 1024 * 1024) return `${(bytes / 1024 / 1024).toFixed(2)} MB`;
    return `${(bytes / 1024).toFixed(2)} KB`;
  }
  function totalStepsFor(file){
    return file.name.toLowerCase().endsWith('.pdf') ? 8 : 7;
  }
  function setProgress(item, percent){
    item.querySelector('.progress-bar').style.width = `${Math.max(0, Math.min(100, percent))}%`;
  }
  function addLog(item, text){
    const list = item.querySelector('.log-list');
    const li = document.createElement('li');
    li.textContent = text;
    list.appendChild(li);
    list.scrollTop = list.scrollHeight;
  }
  function renderStatus(item, data, totalSteps){
    const done = Array.isArray(data.done_list) ? data.done_list : [];
    const running = Array.isArray(data.running_list) ? data.running_list : [];
    const list = item.querySelector('.log-list');
    const summary = item.querySelector('.log summary');
    list.innerHTML = '';
    done.forEach(name => addLog(item, `已完成：${name}`));
    running.forEach(name => addLog(item, `处理中：${name}`));
    if(!done.length && !running.length) addLog(item, '等待处理...');
    summary.textContent = `运行日志（已完成 ${done.length}，进行中 ${running.length}，共 ${totalSteps} 步）`;

    let percent = (done.length / totalSteps) * 100;
    if(running.length) percent += (0.5 / totalSteps) * 100;
    if(data.status !== 'completed') percent = Math.min(percent, 96);
    setProgress(item, data.status === 'completed' ? 100 : percent);
  }
  function createQueueItem(file){
    const id = `file-${Math.random().toString(36).slice(2)}`;
    queue.insertAdjacentHTML('afterbegin', `
      <div class="file-item" id="${id}">
        <div class="file-row">
          <div>
            <div class="file-name">${escapeHtml(file.name)}</div>
            <div class="file-size">${formatSize(file.size)}</div>
          </div>
          <div class="badge">上传中</div>
        </div>
        <div class="progress-track"><div class="progress-bar"></div></div>
        <details class="log" open>
          <summary>准备上传...</summary>
          <ul class="log-list"></ul>
        </details>
      </div>
    `);
    return document.getElementById(id);
  }
  async function uploadFile(file){
    const item = createQueueItem(file);
    const badge = item.querySelector('.badge');
    const totalSteps = totalStepsFor(file);
    const form = new FormData();
    form.append('file', file);
    addLog(item, '开始上传文件...');
    setProgress(item, 8);

    try{
      const res = await fetch(`${API_BASE}/upload`, { method:'POST', body:form });
      if(!res.ok) throw new Error(await res.text() || '上传失败');
      const data = await res.json();
      badge.textContent = '处理中';
      badge.className = 'badge processing';
      pollStatus(data.task_id, item, totalSteps);
    }catch(err){
      badge.textContent = '失败';
      badge.className = 'badge failed';
      addLog(item, `失败：${err.message || err}`);
    }
  }
  function pollStatus(taskId, item, totalSteps){
    const badge = item.querySelector('.badge');
    const timer = setInterval(async () => {
      try{
        const res = await fetch(`${API_BASE}/status/${taskId}`);
        if(!res.ok) return;
        const data = await res.json();
        renderStatus(item, data, totalSteps);
        if(data.status === 'completed'){
          badge.textContent = '已完成';
          badge.className = 'badge done';
          item.querySelector('.log').open = false;
          clearInterval(timer);
          loadMaterials();
        }
        if(data.status === 'failed'){
          badge.textContent = '失败';
          badge.className = 'badge failed';
          clearInterval(timer);
        }
      }catch(_){}
    }, 1400);
  }
  function handleFiles(files){
    Array.from(files || []).forEach(file => {
      if(!/\.(pdf|md|zip)$/i.test(file.name)){
        alert(`${file.name} 不是支持的格式`);
        return;
      }
      uploadFile(file);
    });
    fileInput.value = '';
  }

  async function loadMaterials(){
    materialList.innerHTML = '<div class="empty">正在读取本地资料...</div>';
    try{
      const res = await fetch(`${API_BASE}/materials`);
      const data = await res.json();
      const items = Array.isArray(data.materials) ? data.materials : [];
      if(!items.length){
        materialList.innerHTML = '<div class="empty">目前还没有查询到已导入的本地资料。</div>';
        return;
      }
      materialList.innerHTML = '';
      items.forEach(item => {
        const title = item.file_title || item.material_name || '未命名资料';
        const materialName = item.material_name && item.material_name !== title ? item.material_name : '';
        const card = document.createElement('div');
        card.className = 'material-card';
        card.innerHTML = `
          <div class="material-top">
            <div class="material-info">
              <div class="material-title">${escapeHtml(title)}</div>
              <div class="material-meta">
                ${materialName ? `<span class="chip">识别：${escapeHtml(materialName)}</span>` : ''}
                <span class="chip">${escapeHtml(item.file_type || '资料')}</span>
                <span class="chip">${Number(item.chunk_count || 0)} 个片段</span>
              </div>
            </div>
            <button class="btn danger material-delete" type="button">删除</button>
          </div>
        `;
        card.querySelector('button').addEventListener('click', () => deleteMaterial(item));
        materialList.appendChild(card);
      });
    }catch(err){
      materialList.innerHTML = `<div class="empty">读取失败：${escapeHtml(err.message || err)}</div>`;
    }
  }
  async function deleteMaterial(item){
    const title = item.file_title || item.material_name || '这份资料';
    if(!confirm(`确定要删除「${title}」的本地索引吗？删除后需要重新上传才能再次本地查询。`)) return;
    const params = new URLSearchParams({
      file_title: item.file_title || '',
      material_name: item.material_name || '',
    });
    try{
      const res = await fetch(`${API_BASE}/materials?${params.toString()}`, { method:'DELETE' });
      if(!res.ok) throw new Error(await res.text() || '删除失败');
      await loadMaterials();
    }catch(err){
      alert(`删除失败：${err.message || err}`);
    }
  }
  async function checkConfig(){
    configChecks.innerHTML = '<div class="empty">正在检查配置...</div>';
    try{
      const res = await fetch(`${API_BASE}/config/check`);
      const data = await res.json();
      const rows = [
        ...(data.checks || []).map(x => ({title:x.label, ok:x.ok, detail:x.status})),
        ...(data.services || []).map(x => ({title:x.name, ok:x.ok, detail:x.detail})),
      ];
      configChecks.innerHTML = rows.map(row => `
        <div class="check ${row.ok ? 'ok' : 'bad'}">
          <strong>${escapeHtml(row.title)}</strong>
          <span>${row.ok ? '正常' : '需要检查'}：${escapeHtml(row.detail || '')}</span>
        </div>
      `).join('');
    }catch(err){
      configChecks.innerHTML = `<div class="empty">检查失败：${escapeHtml(err.message || err)}</div>`;
    }
  }

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('dragging');
  });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragging');
    handleFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', e => handleFiles(e.target.files));
  document.getElementById('refreshBtn').addEventListener('click', loadMaterials);
  document.getElementById('loadMaterialsBtn').addEventListener('click', loadMaterials);
  document.getElementById('checkConfigBtn').addEventListener('click', checkConfig);

  loadMaterials();
</script>
</body>
</html>
